# Real Detox iOS simulator run — macOS runners.
# Kept as workflow_dispatch so it only runs when explicitly triggered
# (avoids the minutes cost of macOS runners on every push).
name: Detox iOS (manual)
on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm install -g detox-cli
      - name: Install CocoaPods
        run: cd ios && pod install && cd ..
        continue-on-error: true
      - name: Build iOS app
        run: npm run test:e2e:build:ios
        continue-on-error: true
      - name: Run Detox + Percy (iOS)
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: percy app:exec -- npm run test:e2e:ios
        continue-on-error: true
